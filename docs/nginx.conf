server {
    listen 4321;
    server_name _;
    root /usr/share/nginx/html;

    # Reverse-proxied behind Next.js at /docs/* (frontend/next.config.mjs strips the
    # /docs prefix before forwarding here), so this server has no idea it's mounted
    # under a sub-path. Two things follow from that:
    #
    # 1. Never emit an absolute redirect — nginx would build it from the Host header
    #    it receives internally ("docs:4321"), which is meaningless to a real visitor.
    absolute_redirect off;

    # 2. Never emit nginx's automatic directory redirect for a missing trailing
    #    slash either — even relative, it would drop the (already-stripped) /docs
    #    prefix, sending the browser to https://routepass.online/getting-started/...
    #    instead of .../docs/getting-started/... Serving the directory's index.html
    #    directly (no redirect) sidesteps the whole prefix problem.
    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }
}
