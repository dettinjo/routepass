services:
  -routepass:
    build: .
    image: routepass:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persistent storage for SQLite DB and Strava token
      - ./data:/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
